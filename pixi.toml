[project]
name = "mojo-bm25s"
version = "0.0.0"
description = "Mojo-native BM25 sparse retrieval kernels"
authors = ["oaustegard <oaustegard@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max", "conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[tasks]
# --target-cpu=x86-64-v3 pins codegen to AVX2/FMA baseline. Mojo's default
# (`--target-cpu native`) detects the build host as cascadelake on GH Actions
# and emits AVX-512 (~29 %zmm ops in a baseline lib.mojo build). Some Azure
# VMs in the ubuntu-latest pool advertise AVX-512 in CPUID but trap the
# instructions, so the .so loads with SIGILL on the same machine that built
# it. x86-64-v3 sacrifices VNNI/AVX-512 throughput for portability across
# the heterogeneous runner pool.
build = { cmd = "mkdir -p build && mojo build src/mojo_bm25s/lib.mojo --emit shared-lib --target-cpu=x86-64-v3 -o build/mojo_bm25s.so", outputs = ["build/mojo_bm25s.so"], inputs = ["src/mojo_bm25s/lib.mojo", "src/mojo_bm25s/scoring.mojo", "src/mojo_bm25s/topk.mojo", "src/mojo_bm25s/csc.mojo", "src/mojo_bm25s/retrieve.mojo"] }
test = { cmd = "pytest tests/", depends-on = ["build"] }
bench = { cmd = "python benchmarks/run.py", depends-on = ["build"] }

[dependencies]
modular = "*"
python = "3.12.*"
numpy = "*"
pytest = "*"
numba = "*"
pystemmer = "*"

[pypi-dependencies]
bm25s = "*"
rank-bm25 = "*"
# Used by tests/test_wheel_distribution.py to build and inspect the
# wheel produced by scripts/build_wheel.py.
build = "*"
