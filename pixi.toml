[project]
name = "mojo-bm25s"
version = "0.0.0"
description = "Mojo-native BM25 sparse retrieval kernels"
authors = ["oaustegard <oaustegard@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max", "conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[tasks]
build = "mojo build src/mojo_bm25s/lib.mojo -o build/mojo_bm25s.so"
test = "pytest tests/"
bench = "python benchmarks/run.py"

[dependencies]
modular = "*"
python = "3.12.*"
numpy = "*"
pytest = "*"

[pypi-dependencies]
bm25s = "*"
rank-bm25 = "*"
