[project]
name = "mojo-bm25s"
version = "0.0.0"
description = "Mojo-native BM25 sparse retrieval kernels"
authors = ["oaustegard <oaustegard@users.noreply.github.com>"]
channels = ["https://conda.modular.com/max", "conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[tasks]
build = { cmd = "mkdir -p build && mojo build src/mojo_bm25s/lib.mojo --emit shared-lib -o build/mojo_bm25s.so", outputs = ["build/mojo_bm25s.so"], inputs = ["src/mojo_bm25s/lib.mojo", "src/mojo_bm25s/scoring.mojo", "src/mojo_bm25s/topk.mojo", "src/mojo_bm25s/csc.mojo"] }
test = { cmd = "pytest tests/", depends-on = ["build"] }
bench = { cmd = "python benchmarks/run.py", depends-on = ["build"] }

[dependencies]
modular = "*"
python = "3.12.*"
numpy = "*"
pytest = "*"
numba = "*"
pystemmer = "*"

[pypi-dependencies]
bm25s = "*"
rank-bm25 = "*"
